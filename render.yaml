services:

  - type: web
    name: calendar-api
    runtime: docker
    region: frankfurt                   
    plan: free                           

    rootDir: backend
    dockerfilePath: Calendar.API/Dockerfile
    dockerContext: .                    

    envVars:
      - key: ConnectionStrings__calendar_connection
        fromDatabase:
          name: calendar-db
          property: connectionString

      - key: ASPNETCORE_URLS
        value: http://+:10000

      # URL фронтенда — заполнить в Dashboard после деплоя (например: https://calendar-frontend-xxx.onrender.com)
      - key: AllowedOrigins__0
        sync: false

    healthCheckPath: /

databases:
  - name: calendar-db
    plan: free                          
    region: frankfurt                    